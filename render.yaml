services:
  - type: web
    name: barbie-ai-app-builder
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --no-strict-peer-dependencies && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
